x-spark-common: &spark-common
  image: spark:3.5.8-python3
  environment: &spark-env
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_DATABASE: classicmodels
    MYSQL_USER: etl
    MYSQL_PASSWORD: etl
    ICEBERG_CATALOG: local
    ICEBERG_WAREHOUSE: s3a://warehouse/iceberg
    ICEBERG_BRONZE_NAMESPACE: bronze
    ICEBERG_STAR_NAMESPACE: star_schema
    SPARK_PACKAGES: org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,com.mysql:mysql-connector-j:8.4.0,org.apache.hadoop:hadoop-aws:3.3.4
    SPARK_SUBMIT_CONF: >-
      --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
      --conf spark.sql.catalog.local=org.apache.iceberg.spark.SparkCatalog
      --conf spark.sql.catalog.local.type=hadoop
      --conf spark.sql.catalog.local.warehouse=s3a://warehouse/iceberg
      --conf spark.sql.defaultCatalog=local
      --conf spark.jars.ivy=/tmp/.ivy2
      --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
      --conf spark.hadoop.fs.s3a.access.key=minioadmin
      --conf spark.hadoop.fs.s3a.secret.key=minioadmin
      --conf spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
      --conf spark.hadoop.fs.s3a.path.style.access=true
      --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false
      --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
  volumes:
    - ./etl/jobs:/opt/spark/jobs:ro
  restart: "no"

services:
  mysql:
    image: mysql:8.4
    container_name: classicmodels-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: classicmodels
      MYSQL_USER: etl
      MYSQL_PASSWORD: etl
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: classicmodels-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Airflow Services
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-init
    environment:
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_USER_USERNAME:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_USER_PASSWORD:-admin}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: airflow db init && airflow db migrate && airflow users create --role Admin --username ${AIRFLOW_USER_USERNAME:-admin} --password ${AIRFLOW_USER_PASSWORD:-admin} --email admin@example.com --firstname Admin --lastname User
    restart: "no"

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    restart: always
    environment:
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:-my-secret-key-change-in-prod}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    command: airflow webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    restart: always
    environment:
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__SCHEDULER__USE_JOB_SCHEDULE=True
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/logs:/opt/airflow/logs
      - ./etl/jobs:/opt/spark/jobs:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    command: airflow scheduler

  # Spark services for manual runs (kept for debugging)
  etl-manual:
    <<: *spark-common
    container_name: classicmodels-etl-manual
    profiles:
      - tools
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      bash -lc "
      /opt/spark/bin/spark-submit
      --packages $${SPARK_PACKAGES}
      $${SPARK_SUBMIT_CONF}
      /opt/spark/jobs/build_star_schema.py
      "

  query-manual:
    <<: *spark-common
    container_name: classicmodels-query-manual
    profiles:
      - tools
    depends_on:
      minio:
        condition: service_started
    command: >
      bash -lc "
      /opt/spark/bin/spark-submit
      --packages $${SPARK_PACKAGES}
      $${SPARK_SUBMIT_CONF}
      /opt/spark/jobs/query_star_schema.py
      "

volumes:
  mysql_data:
  minio_data:
  postgres_data:
